<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sigma Planejamento — Prévia TV</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ height:100%; }
  body{ font-family:"Inter",system-ui,sans-serif; color:#E8EDF7; overflow:hidden;
    background:
      radial-gradient(1200px 700px at 50% 16%, rgba(15,76,186,.28), transparent 60%),
      radial-gradient(900px 600px at 82% 92%, rgba(91,138,230,.14), transparent 60%),
      linear-gradient(180deg, #0b1424 0%, #070b13 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2.2vh; }
  body::after{ content:""; position:fixed; left:0; right:0; bottom:0; height:34vh; background:linear-gradient(180deg, transparent, rgba(15,76,186,.05)); pointer-events:none; }
  .back{ position:fixed; top:18px; left:18px; z-index:5; text-decoration:none; color:#C7D6EE;
    background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.14); padding:.55em 1em; border-radius:99px; font-size:13px; font-weight:600; }
  .back:hover{ background:rgba(255,255,255,.16); }
  .top{ display:flex; flex-direction:column; align-items:center; gap:.8vh; z-index:2; }
  .logo-chip{ background:#fff; border-radius:12px; padding:10px 18px; box-shadow:0 10px 30px -12px rgba(0,0,0,.5); }
  .logo-chip img{ height:clamp(24px,4.2vh,44px); display:block; }
  .top .sub{ color:#8FA6C9; font-size:clamp(11px,1.5vh,15px); letter-spacing:4px; text-transform:uppercase; }
  .top .scn{ color:#4D8DF6; font-weight:700; letter-spacing:1px; font-size:clamp(12px,1.6vh,16px); }
  .frame{ transform-origin:center center; }
  .tv{ position:relative; padding:22px; border-radius:26px; background:linear-gradient(160deg,#141924,#0a0e16); box-shadow:0 40px 90px -30px rgba(0,0,0,.85), 0 0 0 1px rgba(255,255,255,.05) inset; }
  .tv::after{ content:""; position:absolute; left:50%; bottom:-3px; transform:translateX(-50%); width:38%; height:4px; border-radius:0 0 8px 8px; background:#080b11; }
  .screen-area{ width:1280px; height:720px; border-radius:8px; overflow:hidden; position:relative; background:#000; }
  .screen-area iframe{ width:1280px; height:720px; border:0; display:block; background:#F1F4F9; }
  .gloss{ position:absolute; inset:0; pointer-events:none; border-radius:8px; background:linear-gradient(115deg, rgba(255,255,255,.10) 0%, rgba(255,255,255,0) 22%, rgba(255,255,255,0) 100%); }
  .live{ position:absolute; top:16px; left:16px; z-index:3; display:inline-flex; align-items:center; gap:.5em; background:rgba(7,11,19,.6); backdrop-filter:blur(4px); padding:.35em .8em; border-radius:99px; font-size:13px; font-weight:700; letter-spacing:1px; color:#fff; }
  .live .b{ width:.65em; height:.65em; border-radius:99px; background:#4D8DF6; box-shadow:0 0 0 0 rgba(77,141,246,.6); animation:p 1.6s infinite; }
  @keyframes p{0%{box-shadow:0 0 0 0 rgba(77,141,246,.5)}70%{box-shadow:0 0 0 .7em rgba(77,141,246,0)}100%{box-shadow:0 0 0 0 rgba(77,141,246,0)}}
  .stand{ width:220px; height:70px; margin:0 auto; position:relative; }
  .stand::before{ content:""; position:absolute; top:0; left:50%; transform:translateX(-50%); width:26px; height:44px; background:linear-gradient(180deg,#121826,#0a0e16); }
  .stand::after{ content:""; position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:200px; height:14px; border-radius:50%; background:radial-gradient(ellipse at center, #12182688 0%, rgba(0,0,0,0) 72%); }
  .bottom{ text-align:center; z-index:2; }
  .bottom h1{ font-family:"Exo 2",sans-serif; font-weight:800; font-size:clamp(15px,2.2vh,26px); letter-spacing:.5px; }
  .bottom p{ margin-top:.35em; color:#8FA6C9; font-size:clamp(11px,1.5vh,15px); }
</style>
</head>
<body>
  <a class="back" href="apresentacao.html">← Cenários</a>
  <div class="top">
    <div class="logo-chip"><img src="https://kiwiykgzogcxiseynzyy.supabase.co/storage/v1/object/public/LOGO-Empresas/sigmacode.png" alt="Sigma Code"></div>
    <div class="sub">Sigma Planejamento</div>
    <div class="scn" id="scn"></div>
  </div>
  <div class="frame" id="frame">
    <div class="tv">
      <div class="screen-area">
        <span class="live"><span class="b"></span>AO VIVO</span>
        <iframe id="tela" title="Painel"></iframe>
        <div class="gloss"></div>
      </div>
    </div>
    <div class="stand"></div>
  </div>
  <div class="bottom">
    <h1>Refinaria Costa Azul — parada geral de manutenção</h1>
    <p>Escopo · Curva S · Cronograma · Report · Stand By — 8 telas girando a cada 10s</p>
  </div>
<script>
  var cenNames={cenario1:"Início da Parada",cenario2:"Parada em Andamento",cenario3:"Reta Final"};
  var q=new URLSearchParams(location.search);
  var cen=q.get("cenario"); if(!/^cenario[123]$/.test(cen)){ cen = cen==="1"||cen==="2"||cen==="3" ? "cenario"+cen : "cenario2"; }
  document.getElementById("scn").textContent=cenNames[cen]||"";
  document.getElementById("tela").src="01-menu.html?tv=1&t=10&theme=sigma&demo="+cen;
  function fit(){ var f=document.getElementById('frame');
    var availW=window.innerWidth*0.92, availH=window.innerHeight*0.58, baseW=1280+44, baseH=720+44+70;
    f.style.transform='scale('+Math.min(availW/baseW, availH/baseH, 1.1)+')'; }
  window.addEventListener('resize',fit); fit();
</script>
</body>
</html>
