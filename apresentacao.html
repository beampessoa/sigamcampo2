<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sigma Code · apresenta o Sigma Planejamento</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --blue:#0F4CBA; --blue-2:#4D8DF6; }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{ min-height:100%; }
  body{ font-family:"Inter",system-ui,sans-serif; color:#E8EDF7; min-height:100vh;
    background:
      radial-gradient(1200px 800px at 50% -10%, rgba(15,76,186,.30), transparent 60%),
      radial-gradient(900px 700px at 85% 110%, rgba(77,141,246,.14), transparent 55%),
      linear-gradient(180deg, #0b1424 0%, #070b13 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:clamp(20px,4vh,44px); padding:5vh 4vw; }

  .head{ text-align:center; display:flex; flex-direction:column; align-items:center; gap:14px; }
  .logo-chip{ background:#fff; border-radius:14px; padding:12px 22px; box-shadow:0 14px 34px -14px rgba(0,0,0,.6); }
  .logo-chip img{ height:clamp(30px,5.2vh,52px); display:block; }
  .apresenta{ color:#8FA6C9; letter-spacing:5px; text-transform:uppercase; font-size:clamp(10px,1.5vh,13px); }
  .head h1{ font-family:"Exo 2",sans-serif; font-weight:900; font-size:clamp(30px,6vh,58px); letter-spacing:1px; line-height:1; }
  .head h1 b{ color:var(--blue-2); font-weight:900; }
  .head p{ color:#9DB2D2; font-size:clamp(13px,1.9vh,17px); max-width:640px; margin-top:6px; }

  .pergunta{ color:#7E93B4; font-size:clamp(12px,1.6vh,15px); letter-spacing:1px; text-transform:uppercase; margin-bottom:-8px; }
  .cards{ display:grid; grid-template-columns:repeat(3,minmax(220px,300px)); gap:22px; }
  @media(max-width:820px){ .cards{ grid-template-columns:1fr; } }
  .card{ text-decoration:none; color:inherit; background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
    border:1px solid rgba(255,255,255,.10); border-radius:20px; padding:26px 24px; display:flex; flex-direction:column; align-items:center; gap:14px;
    transition:transform .15s, border-color .15s, box-shadow .15s; position:relative; overflow:hidden; }
  .card:hover{ transform:translateY(-4px); border-color:var(--blue-2); box-shadow:0 26px 60px -30px rgba(15,76,186,.8); }
  .card .ring{ width:112px; height:112px; }
  .card h2{ font-family:"Exo 2",sans-serif; font-size:20px; font-weight:800; text-align:center; }
  .card .desc{ color:#9DB2D2; font-size:13px; text-align:center; line-height:1.5; min-height:52px; }
  .card .chips{ display:flex; gap:6px; flex-wrap:wrap; justify-content:center; }
  .card .chip{ font-size:10.5px; letter-spacing:.5px; padding:.3em .7em; border-radius:99px; font-weight:700; }
  .chip.ok{ background:rgba(34,197,94,.16); color:#4ADE80; }
  .chip.warn{ background:rgba(245,158,11,.16); color:#FBBF24; }
  .chip.bad{ background:rgba(239,68,68,.18); color:#F87171; }
  .card .play{ margin-top:4px; display:inline-flex; align-items:center; gap:.5em; background:var(--blue); color:#fff; font-weight:700; font-size:13px; padding:.6em 1.2em; border-radius:99px; }
  .card:hover .play{ background:var(--blue-2); }
  .card .tag{ position:absolute; top:14px; right:-30px; transform:rotate(38deg); background:var(--blue-2); color:#04122e; font-size:10px; font-weight:800; letter-spacing:1px; padding:3px 34px; }

  .foot{ color:#63789B; font-size:12px; text-align:center; }
  .foot b{ color:#9DB2D2; }
</style>
</head>
<body>

  <div class="head">
    <div class="logo-chip"><img src="https://kiwiykgzogcxiseynzyy.supabase.co/storage/v1/object/public/LOGO-Empresas/sigmacode.png" alt="Sigma Code"></div>
    <div class="apresenta">Sigma Code apresenta</div>
    <h1>SIGMA <b>PLANEJAMENTO</b></h1>
    <p>O painel gerencial que leva a parada de manutenção do campo direto pra TV — em tempo real. Escolha um cenário e veja o controle acontecendo.</p>
  </div>

  <div class="pergunta">Escolha o momento da parada</div>
  <div class="cards" id="cards"></div>

  <div class="foot">Demonstração com dados fictícios · <b>Refinaria Costa Azul</b> — U-4200 / U-4600 / U-5100</div>

<script>
  var CEN=[
    {id:"cenario1",nome:"Início da Parada",pct:16,cor:"#4D8DF6",
     desc:"Mobilização e primeiras frentes. Muita coisa pendente, curva começando a subir.",
     chips:[["warn","Em andamento"],["bad","1 atraso"]]},
    {id:"cenario2",nome:"Parada em Andamento",pct:56,cor:"#FBBF24",destaque:true,
     desc:"Execução a todo vapor — com atrasos e impeditivos acendendo em vermelho. O poder do controle.",
     chips:[["warn","Em andamento"],["bad","25 atrasados"],["bad","6 impeditivos"]]},
    {id:"cenario3",nome:"Reta Final",pct:94,cor:"#4ADE80",
     desc:"Comissionamento e últimas pendências. Quase tudo verde, fechando a parada.",
     chips:[["ok","Concluindo"],["warn","2 pendências"]]}
  ];
  function ring(pct,cor){
    var r=48, c=2*Math.PI*r, off=c*(1-pct/100);
    return '<svg class="ring" viewBox="0 0 120 120">'+
      '<circle cx="60" cy="60" r="'+r+'" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="10"/>'+
      '<circle cx="60" cy="60" r="'+r+'" fill="none" stroke="'+cor+'" stroke-width="10" stroke-linecap="round" '+
      'stroke-dasharray="'+c+'" stroke-dashoffset="'+off+'" transform="rotate(-90 60 60)"/>'+
      '<text x="60" y="60" text-anchor="middle" dominant-baseline="central" font-family="Exo 2,sans-serif" font-weight="800" font-size="26" fill="#E8EDF7">'+pct+'%</text>'+
      '</svg>';
  }
  document.getElementById("cards").innerHTML=CEN.map(function(s){
    return '<a class="card" href="preview-tv.html?cenario='+s.id+'">'+
      (s.destaque?'<span class="tag">RECOMENDADO</span>':'')+
      ring(s.pct,s.cor)+
      '<h2>'+s.nome+'</h2>'+
      '<div class="desc">'+s.desc+'</div>'+
      '<div class="chips">'+s.chips.map(function(ch){return '<span class="chip '+ch[0]+'">'+ch[1]+'</span>';}).join('')+'</div>'+
      '<span class="play">▶ Abrir na TV</span>'+
    '</a>';
  }).join('');
</script>
</body>
</html>
