<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sigma Planejamento — Controle Geral</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@600;700;800&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="sigma.css">
</head>
<body data-page="escopo" data-title="Controle Geral">
<div class="screen">
  <header id="hdr"></header>
  <main class="stage"><section class="panel">
    <div class="grid" style="grid-template-columns:.9fr 3fr">
      <div class="box">
        <div class="cap">Acumulado realizado geral | %</div>
        <div class="gauge"><div class="gaugebox" id="gEsc"></div><div class="gcap">Realizado</div></div>
        <div class="daybars" id="dayBars"></div>
      </div>
      <div class="grid" style="grid-template-rows:2.4fr 1fr">
        <div class="box"><div class="cap">Status de execução — itens escopo</div><div class="scroll"><table id="tEscopo"></table></div></div>
        <div class="box"><div class="cap">Status de execução — itens extra</div><div class="scroll"><table id="tExtra"></table></div></div>
      </div>
    </div>
  </section></main>
  <footer id="ftr"></footer>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="sigma.js"></script>
</body>
</html>
